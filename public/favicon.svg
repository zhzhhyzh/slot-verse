<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d078"/>
      <stop offset="50%" style="stop-color:#d4a94a"/>
      <stop offset="100%" style="stop-color:#b8943c"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1930"/>
      <stop offset="100%" style="stop-color:#0a0a12"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="50%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#a0a0a0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#dark)" stroke="url(#gold)" stroke-width="3"/>
  <!-- Inner gold ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <!-- Slot reels background -->
  <rect x="14" y="18" width="36" height="24" rx="4" fill="#0c1a0c" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Reel dividers -->
  <line x1="26" y1="19" x2="26" y2="41" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <line x1="38" y1="19" x2="38" y2="41" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <!-- Reel symbols: 7 - star - diamond -->
  <text x="20" y="35" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#e74c3c" text-anchor="middle">7</text>
  <text x="32" y="35" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#f0d078">&#9733;</text>
  <text x="44" y="35" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="#3498db">&#9670;</text>
  <!-- Pull handle -->
  <rect x="52" y="22" width="4" height="16" rx="2" fill="url(#silver)"/>
  <circle cx="54" cy="22" r="3.5" fill="url(#gold)" stroke="#b8943c" stroke-width="0.5"/>
  <!-- Bottom decorative dots (lights) -->
  <circle cx="22" cy="47" r="2" fill="#e74c3c" opacity="0.9"/>
  <circle cx="32" cy="47" r="2" fill="#f0d078" opacity="0.9"/>
  <circle cx="42" cy="47" r="2" fill="#2ecc71" opacity="0.9"/>
  <!-- Top text: SV -->
  <text x="32" y="15" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="2">SV</text>
  <!-- Bottom sparkles -->
  <text x="12" y="54" font-size="6" fill="#f0d078" opacity="0.6">&#10022;</text>
  <text x="52" y="54" font-size="6" fill="#f0d078" opacity="0.6">&#10022;</text>
</svg>
